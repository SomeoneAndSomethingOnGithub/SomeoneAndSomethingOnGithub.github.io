<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Cookie Clicker: Mega Expansion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05070a;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-150px) scale(1.8); }
        }

        .cyber-grid {
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(25deg);
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(2, 6, 23, 0.99));
            backdrop-filter: blur(40px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -20px 0 50px rgba(0,0,0,0.8);
        }

        .text-glow {
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5), 0 0 40px rgba(34, 211, 238, 0.2);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .floating-text {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            color: #22d3ee;
            font-weight: 900;
            font-style: italic;
            font-size: 2.5rem;
            animation: floatUp 0.8s ease-out forwards;
        }

        .tree-container { 
            position: relative; 
            min-height: 2500px; 
            width: 100%; 
            background: rgba(0,0,0,0.3);
            border-radius: 1rem;
            overflow-x: hidden;
            overflow-y: auto;
        }
        .tree-node {
            position: absolute; 
            width: 50px; 
            height: 50px; 
            border-radius: 1rem;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            cursor: pointer; 
            transition: all 0.3s; 
            z-index: 5; 
            border: 2px solid rgba(255,255,255,0.05);
            transform: translate(-50%, -50%);
        }
        .tree-node.locked { background: #1e293b; filter: grayscale(1); opacity: 0.4; cursor: not-allowed; }
        .tree-node.available { background: rgba(34, 211, 238, 0.1); border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
        .tree-node.purchased { background: #22d3ee; border-color: #fff; box-shadow: 0 0 20px rgba(34, 211, 238, 0.6); color: #000; }
        .tree-node.transcendent.available { border-color: #f472b6; box-shadow: 0 0 15px rgba(244, 114, 182, 0.4); }
        .tree-node.transcendent.purchased { background: #f472b6; border-color: #fff; box-shadow: 0 0 20px rgba(244, 114, 182, 0.7); }

        .node-tooltip {
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
            width: 220px; background: #0f172a; border: 1px solid rgba(255,255,255,0.2);
            padding: 12px; border-radius: 8px; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 50;
            text-align: center; font-size: 11px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tree-node:hover .node-tooltip { opacity: 1; }
        svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }

        .item-card {
            transition: transform 0.1s, box-shadow 0.2s, background-color 0.2s, border-color 0.2s;
        }
        .item-card:active { transform: scale(0.98); }
        
        .afford-glow {
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.15);
            border-color: rgba(34, 211, 238, 0.4) !important;
            opacity: 1 !important;
        }

        /* Tab Active States */
        .tab-active-cyan {
            background-color: rgba(34, 211, 238, 0.1) !important;
            color: #22d3ee !important;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2);
            border: 1px solid rgba(34, 211, 238, 0.3);
        }
        .tab-active-pink {
            background-color: rgba(244, 114, 182, 0.1) !important;
            color: #f472b6 !important;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.2);
            border: 1px solid rgba(244, 114, 182, 0.3);
        }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute -bottom-[10%] left-[-10%] w-[120%] h-[60%] cyber-grid"></div>
    </div>

    <!-- MAIN GAME -->
    <main class="flex-1 relative flex flex-col items-center justify-center p-8 z-10">

                </div>
                <div class="text-center border-l border-white/10 pl-8">

                </div>
            </div>
        </div>

        <button id="main-orb" class="relative group outline-none active:scale-95 transition-transform">

                <div id="orb-inner" class="w-48 h-48 rounded-full bg-gradient-to-tr from-cyan-900/30 to-blue-900/30 flex items-center justify-center border border-white/10">
                   <span id="core-label" class="text-cyan-500 font-black text-3xl italic transition-colors">PULSE</span>
                </div>
            </div>
        </button>

        <div id="action-prompts" class="mt-8 h-12 flex items-center justify-center">
            <!-- Central button removed and integrated into Chips tab for better flow -->
        </div>
    </main>

    <!-- DASHBOARD -->
    <aside class="w-[500px] h-full flex flex-col glass-panel z-20">
        <!-- Singularity Panel -->
        <div class="p-6 bg-black/40 border-b border-white/10">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <div class="text-[10px] font-black text-pink-500 uppercase tracking-widest">Singularity Engine</div>
                    <div class="text-2xl font-black text-white italic tabular-nums"><span id="super-count">0</span> Super Chips</div>
                </div>
                <button id="super-breach-btn" onclick="singularityTranscend()" class="px-4 py-2 bg-pink-600/20 border border-pink-500/50 text-pink-400 text-[10px] font-black rounded-lg hover:bg-pink-600 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                    BREACH SINGULARITY
                </button>
            </div>
            <div class="relative w-full h-1.5 bg-white/5 rounded-full overflow-hidden mb-2">
                <div id="super-progress-bar" class="absolute top-0 left-0 h-full bg-pink-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-[8px] font-bold text-slate-500 uppercase tracking-tighter mono">
                <span>P: <span id="curr-chips">0</span> / 1.00T</span>
                <span id="super-gain-info" class="text-pink-400">Yield: +0 SC</span>
            </div>
        </div>

        <header class="p-4 border-b border-white/5 bg-black/20">
            <nav class="grid grid-cols-5 gap-1 bg-black/40 p-1 rounded-xl border border-white/5">
                <button onclick="setTab('items')" class="nav-btn py-2 text-[8px] font-black uppercase tracking-tighter rounded-lg transition-all text-slate-500 hover:text-white" id="tab-items">Systems</button>
                <button onclick="setTab('upgrades')" class="nav-btn py-2 text-[7px] font-black uppercase tracking-tighter rounded-lg transition-all leading-none px-0.5 text-slate-500 hover:text-white" id="tab-upgrades">Optimization</button>
                <button onclick="setTab('tree')" class="nav-btn py-2 text-[8px] font-black uppercase tracking-tighter rounded-lg transition-all text-slate-500 hover:text-white" id="tab-tree">Chips</button>
                <button onclick="setTab('trans-tree')" class="nav-btn py-2 text-[8px] font-black uppercase tracking-tighter rounded-lg transition-all text-slate-500 hover:text-white" id="tab-trans-tree">S.Chips</button>
                <button onclick="setTab('stats')" class="nav-btn py-2 text-[8px] font-black uppercase tracking-tighter rounded-lg transition-all text-slate-500 hover:text-white" id="tab-stats">Stats</button>
            </nav>
        </header>

        <section id="content-area" class="flex-1 overflow-y-auto p-4 no-scrollbar space-y-2"></section>

        <footer class="p-4 border-t border-white/5 bg-black/40">
            <button id="auto-pulse-btn" class="w-full py-4 rounded-xl font-black uppercase tracking-[0.3em] text-[9px] border border-white/10 text-slate-500 hover:bg-white/5 transition-all">
                Auto-Pulse Offline
            </button>
        </footer>
    </aside>

            const val = localStorage.getItem(key);
            if (!val) return def;
            try { return JSON.parse(val); } catch { return isNaN(val) ? val : parseFloat(val); }
        }

        let totalCookiesEarned = load('cs_total', 0);
        let totalCookiesLifetime = load('cs_lifetime', 0);
        let prestige = load('cs_prestige', 0);

        let spentPrestige = load('cs_spent_p', ['p_root']);
        let spentSuper = load('cs_spent_s', ['s_root']);
        let ownedUpgrades = load('cs_owned_u', []);
        let counts = load('cs_counts', {});
        let activeTab = 'items';
        let autoPulseActive = false;

        const UPGRADES = [

            { id: 'u_b3', name: 'Efficiency v3', cost: 10e6, desc: 'All buildings x2', type: 'building', mult: 2 },

            { id: 'u_b5', name: 'Efficiency v5', cost: 100e9, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u5', name: 'Atomic Tap', cost: 1e12, desc: 'Clicks x50', type: 'click', mult: 50 },
            { id: 'u_b6', name: 'Efficiency v6', cost: 10e12, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u6', name: 'Hyper Logic', cost: 1e15, desc: 'Clicks x100', type: 'click', mult: 100 },
            { id: 'u_b7', name: 'Efficiency v7', cost: 1e15, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b8', name: 'Efficiency v8', cost: 100e15, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b9', name: 'Efficiency v9', cost: 10e18, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b10', name: 'Efficiency v10', cost: 1e21, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b11', name: 'Efficiency v11', cost: 100e21, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b12', name: 'Efficiency v12', cost: 10e24, desc: 'All buildings x2', type: 'building', mult: 2 },
            { id: 'u_b13', name: 'Efficiency v13', cost: 1e27, desc: 'All buildings x2', type: 'building', mult: 2 }
        ].sort((a, b) => a.cost - b.cost);

        const PRESTIGE_TREE = [
            { id: 'p_root', name: 'Origin', cost: 0, x: 220, y: 50, requires: [], desc: "The chip foundation." },
            { id: 'p1', name: 'Legacy Flow', cost: 1, x: 100, y: 150, requires: ['p_root'], desc: "Start with 10k." },

            { id: 'p5', name: 'Citadel Boost', cost: 2500, x: 340, y: 450, requires: ['p3', 'p_crit'], desc: "Citadels x5 efficiency." },
            { id: 'p_auto2', name: 'Hyper-Pulse', cost: 10000, x: 50, y: 580, requires: ['p4'], desc: "Auto-Pulse is 2x faster." },
            { id: 'p_mult2', name: 'Chain Logic', cost: 25000, x: 220, y: 580, requires: ['p_exp'], desc: "Global Multiplier x3." },
            { id: 'p_hive', name: 'Hive Mind', cost: 50000, x: 390, y: 580, requires: ['p5'], desc: "Data Hives x10 efficiency." },
            { id: 'p_meta', name: 'Meta Factory', cost: 1000000, x: 100, y: 720, requires: ['p_auto2', 'p_mult2'], desc: "Building Multiplier x2." },
            { id: 'p_dark', name: 'Dark Matter', cost: 5000000, x: 340, y: 720, requires: ['p_hive', 'p_mult2'], desc: "Global Multiplier x5." },
            { id: 'p_void', name: 'Void Engine', cost: 100000000, x: 220, y: 860, requires: ['p_meta', 'p_dark'], desc: "CPS contributes to clicks (0.5%)." },
            { id: 'p6', name: 'Trillionth Gate', cost: 1000000000, x: 220, y: 1000, requires: ['p_void'], desc: "The gate to Singularity." },
            { id: 'p_god1', name: 'Titan Script', cost: 10e9, x: 100, y: 1150, requires: ['p6'], desc: "Galaxy Brains x100." },
            { id: 'p_god2', name: 'Aeon Pulse', cost: 50e9, x: 340, y: 1150, requires: ['p6'], desc: "Click Power x100." },
            { id: 'p_inf1', name: 'Infinity Loom', cost: 250e9, x: 220, y: 1300, requires: ['p_god1', 'p_god2'], desc: "Building Costs -25%." },

        ];

        const TRANS_TREE = [
            { id: 's_root', name: 'Singularity', cost: 0, x: 220, y: 50, requires: [], desc: "The 5x multiplier core." },
            { id: 's1', name: 'Time Warp', cost: 1, x: 100, y: 180, requires: ['s_root'], desc: "Game speed x2." },
            { id: 's2', name: 'Neural Focus', cost: 1, x: 340, y: 180, requires: ['s_root'], desc: "Clicks give 1% of CPS." },

            { id: 's6', name: 'Mega Mult', cost: 10000, x: 220, y: 570, requires: ['s4', 's5'], desc: "Super Chips give 10x multi instead of 5x." },
            { id: 's7', name: 'God Algorithm', cost: 100000, x: 100, y: 700, requires: ['s6'], desc: "Global Multiplier x10,000." },
            { id: 's8', name: 'Eternal Loop', cost: 500000, x: 340, y: 700, requires: ['s6'], desc: "Game speed x10." },

        function saveAll() {
            localStorage.setItem('cs_cookies', cookies);
            localStorage.setItem('cs_total', totalCookiesEarned);
            localStorage.setItem('cs_lifetime', totalCookiesLifetime);
            localStorage.setItem('cs_prestige', prestige);
            localStorage.setItem('cs_super', superChips);
            localStorage.setItem('cs_spent_p', JSON.stringify(spentPrestige));
            localStorage.setItem('cs_spent_s', JSON.stringify(spentSuper));
            localStorage.setItem('cs_owned_u', JSON.stringify(ownedUpgrades));
            localStorage.setItem('cs_counts', JSON.stringify(counts));
        }

        function getGlobalMultiplier() {
            let m = 1 + (prestige * 0.05);
            if (spentPrestige.includes('p_fast')) m *= 1.1;
            if (spentPrestige.includes('p3')) m *= 2;
            if (spentPrestige.includes('p_mult2')) m *= 3;
            if (spentPrestige.includes('p_dark')) m *= 5;
            if (spentPrestige.includes('p_trill')) m *= 1000000;
            const superBase = spentSuper.includes('s6') ? 10 : 5;
            m *= Math.pow(superBase, superChips);
            if (spentSuper.includes('s3')) m *= 100;
            if (spentSuper.includes('s7')) m *= 10000;
            return m;
        }

        function getClickPower() {
            let p = 1;
            UPGRADES.forEach(u => { if (ownedUpgrades.includes(u.id) && u.type === 'click') p *= u.mult; });
            if (spentPrestige.includes('p2')) p *= 1.5;
            if (spentPrestige.includes('p_exp')) p *= 3;
            if (spentPrestige.includes('p_god2')) p *= 100;
            if (spentSuper.includes('s9')) p *= 1e6;
            let final = p * getGlobalMultiplier();
            if (spentPrestige.includes('p_void')) final += (getTotalCPS() * 0.005);
            if (spentSuper.includes('s2')) final += (getTotalCPS() * 0.01);
            if (spentPrestige.includes('p_crit') && Math.random() < 0.01) final *= 100;
            return final;
        }

        function getTotalCPS() {
            let total = 0;
            ITEMS.forEach(item => {
                let buildingMult = 1;
                UPGRADES.forEach(u => { if (ownedUpgrades.includes(u.id) && u.type === 'building') buildingMult *= u.mult; });
                if (item.id === 'i4' && spentPrestige.includes('p5')) buildingMult *= 5;
                if (item.id === 'i6' && spentPrestige.includes('p_hive')) buildingMult *= 10;
                if (item.id === 'i12' && spentPrestige.includes('p_god1')) buildingMult *= 100;
                if (spentPrestige.includes('p_meta')) buildingMult *= 2;
                if (spentPrestige.includes('p_source')) buildingMult *= 100;
                if (spentSuper.includes('s4')) buildingMult *= 10;
                total += (counts[item.id] || 0) * item.cps * buildingMult;
            });
            return total * getGlobalMultiplier();
        }

        function getGameSpeed() {
            let s = 1;
            if (spentSuper.includes('s1')) s *= 2;
            if (spentSuper.includes('s8')) s *= 10;
            return s;
        }

        function getItemCost(item) { 
            let scale = 1.15;
            if (spentSuper.includes('s5')) scale = 1.075; 
            let cost = item.cost * Math.pow(scale, (counts[item.id] || 0));
            if (spentPrestige.includes('p_gold')) cost *= 0.95;
            if (spentPrestige.includes('p_inf1')) cost *= 0.75;
            return cost; 
        }

        function format(n) {
            if (n < 1000) return Math.floor(n);
            const units = ["", "k", "M", "B", "T", "Qa", "Qi", "Sx", "Sp", "Oc", "No", "Dc", "Ud", "Dd", "Td", "Qad", "Qid", "Sxd"];
            const e = Math.floor(Math.log10(n) / 3);
            return (n / Math.pow(1000, e)).toFixed(2) + (units[e] || "??");
        }

        function ascend() {
            const pending = Math.max(0, Math.floor(totalCookiesLifetime / 1e9) - prestige);
            if (pending < 1) return;
            prestige += pending;
            cookies = spentPrestige.includes('p1') ? 10000 : 0;
            totalCookiesEarned = 0;
            counts = {};
            ownedUpgrades = [];
            saveAll();
            setTab('tree');
        }

        function singularityTranscend() {
            const pending = Math.max(0, Math.floor(prestige / 1e12) - superChips);
            if (pending < 1) return;
            superChips += pending;
            prestige = 0;
            spentPrestige = ['p_root'];
            cookies = 0;
            totalCookiesEarned = 0;
            totalCookiesLifetime = 0;
            counts = {};
            ownedUpgrades = [];
            saveAll();
            setTab('trans-tree');
        }

        function renderTree(treeData, spentData, totalCurrency, isSuper) {
            const area = document.getElementById('content-area');
            const totalSpent = spentData.reduce((acc, id) => {
                const node = treeData.find(n => n.id === id);
                return acc + (node ? node.cost : 0);
            }, 0);
            const available = totalCurrency - totalSpent;

            const pendingChips = Math.max(0, Math.floor(totalCookiesLifetime / 1e9) - prestige);
            const nextChipProgress = (totalCookiesLifetime % 1e9) / 1e9 * 100;

            area.innerHTML = `
                <!-- Prestige Info Panel -->
                <div class="mb-4 space-y-2">
                    <div class="p-4 bg-black/40 border border-white/5 rounded-2xl">
                        <div class="flex justify-between items-center mb-3">
                             <div>
                                <div class="text-[8px] font-black ${isSuper ? 'text-pink-400' : 'text-cyan-400'} uppercase">Total ${isSuper ? 'Super Chips' : 'Prestige Chips'}</div>
                                <div class="text-2xl font-black italic mono">${format(totalCurrency)}</div>
                             </div>
                             <div class="text-right">
                                <div class="text-[8px] font-black text-slate-500 uppercase">Available</div>
                                <div class="text-xl font-black italic mono text-white">${format(available)}</div>
                             </div>
                        </div>

                        ${!isSuper ? `
                        <div class="pt-3 border-t border-white/5">
                            <button onclick="ascend()" class="w-full py-3 bg-cyan-500 text-black font-black italic rounded-xl hover:scale-[1.02] active:scale-95 transition-all shadow-lg shadow-cyan-500/20 disabled:opacity-30 disabled:cursor-not-allowed" ${pendingChips < 1 ? 'disabled' : ''}>
                                TRANSCEND FOR +${format(pendingChips)} CHIPS
                            </button>
                            <div class="mt-2 flex items-center gap-2">
                                <div class="flex-1 h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-cyan-500/50" style="width: ${nextChipProgress}%"></div>
                                </div>
                                <div class="text-[7px] font-black text-slate-500 uppercase mono">Next: ${format(1e9 - (totalCookiesLifetime % 1e9))}</div>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>

                <div class="tree-container" id="tree-vp">
                    <svg id="${isSuper ? 'trans-tree-svg' : 'tree-svg'}"></svg>
                </div>
            `;

            const vp = document.getElementById('tree-vp');
            const svg = document.getElementById(isSuper ? 'trans-tree-svg' : 'tree-svg');

            treeData.forEach(node => {
                const purchased = spentData.includes(node.id);
                const reqsMet = node.requires.every(r => spentData.includes(r));
                const availableToBuy = reqsMet && !purchased;

                node.requires.forEach(parentID => {
                    const parent = treeData.find(p => p.id === parentID);
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", parent.x); line.setAttribute("y1", parent.y);
                    line.setAttribute("x2", node.x); line.setAttribute("y2", node.y);
                    line.setAttribute("stroke", purchased ? (isSuper ? "#f472b6" : "#22d3ee") : "#1e293b");
                    line.setAttribute("stroke-width", purchased ? "4" : "2");
                    svg.appendChild(line);
                });

                const el = document.createElement('div');
                el.className = `tree-node ${isSuper ? 'transcendent' : ''} ${purchased ? 'purchased' : availableToBuy ? 'available' : 'locked'}`;
                el.style.left = node.x + 'px'; el.style.top = node.y + 'px';
                el.innerHTML = `
                    <span class="text-[8px] font-black">${format(node.cost)}</span>
                    <div class="node-tooltip">
                        <div class="font-black ${isSuper ? 'text-pink-400' : 'text-cyan-400'} uppercase">${node.name}</div>
                        <div class="text-slate-400 mt-1">${node.desc}</div>
                        ${availableToBuy ? `<div class="mt-2 text-white font-bold">COST: ${format(node.cost)}</div>` : purchased ? '<div class="mt-2 text-white/50 uppercase">Active</div>' : '<div class="mt-2 text-red-400 uppercase">Locked</div>'}
                    </div>
                `;
                el.onclick = () => {
                    if (availableToBuy && available >= node.cost) {
                        spentData.push(node.id);
                        saveAll();
                        render();
                    }
                };
                vp.appendChild(el);
            });
        }

        function setTab(t) { 
            activeTab = t; 
            updateTabNavigationUI();
            render(); 
        }

        function updateTabNavigationUI() {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('tab-active-cyan', 'tab-active-pink', 'text-white');
                btn.classList.add('text-slate-500');
            });

            const currentBtn = document.getElementById('tab-' + activeTab);
            if (currentBtn) {
                currentBtn.classList.remove('text-slate-500');
                currentBtn.classList.add('text-white');
                
                if (activeTab === 'tree' || activeTab === 'trans-tree') {
                    currentBtn.classList.add('tab-active-pink');
                } else {
                    currentBtn.classList.add('tab-active-cyan');
                }
            }
        }

        function render() {
            const area = document.getElementById('content-area');
            if (activeTab === 'tree') return renderTree(PRESTIGE_TREE, spentPrestige, prestige, false);
            if (activeTab === 'trans-tree') return renderTree(TRANS_TREE, spentSuper, superChips, true);

            area.innerHTML = '';
            if (activeTab === 'items') {
                ITEMS.forEach(it => {
                    const c = getItemCost(it);
                    const aff = cookies >= c;
                    const el = document.createElement('button');
                    el.id = 'buy-' + it.id;
                    el.className = `item-card w-full flex items-center gap-4 p-4 rounded-2xl border border-white/5 transition-all ${aff ? 'bg-white/5 hover:bg-white/10 afford-glow' : 'opacity-30'}`;
                    el.onclick = () => { if (cookies >= c) { cookies -= c; counts[it.id] = (counts[it.id] || 0) + 1; saveAll(); render(); } };
                    el.innerHTML = `<div class="w-12 h-12 rounded-xl bg-gradient-to-br ${it.color} flex items-center justify-center font-black text-white text-xs">${counts[it.id] || 0}</div>
                        <div class="flex-1 text-left"><div class="text-[8px] font-black text-slate-500 uppercase tracking-widest">${it.name}</div><div class="text-lg font-black italic mono">${format(c)}</div></div>`;
                    area.appendChild(el);
                });
            } else if (activeTab === 'upgrades') {
                UPGRADES.filter(u => !ownedUpgrades.includes(u.id)).forEach(u => {
                    const aff = cookies >= u.cost;
                    const el = document.createElement('button');
                    el.id = 'buy-' + u.id;
                    el.className = `w-full text-left p-4 rounded-2xl border border-white/5 transition-all ${aff ? 'bg-cyan-500/10 border-cyan-400/20 afford-glow' : 'opacity-30'}`;
                    el.onclick = () => { if (cookies >= u.cost) { cookies -= u.cost; ownedUpgrades.push(u.id); saveAll(); render(); } };
                    el.innerHTML = `<div class="text-[10px] font-black text-cyan-300 uppercase tracking-wider">${u.name}</div><div class="text-[9px] text-slate-400 mb-1 leading-tight">${u.desc}</div><div class="font-black text-white italic mono">${format(u.cost)}</div>`;
                    area.appendChild(el);
                });
            } else if (activeTab === 'stats') {
                area.innerHTML = `<div class="space-y-4 p-2 text-sm">
                    <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
                        <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-2">Total Multiplier</div>
                        <div class="text-3xl font-black italic text-cyan-400 mono">x${format(getGlobalMultiplier())}</div>
                    </div>
                    <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
                        <div class="text-[9px] text-slate-500 uppercase font-black tracking-widest mb-2">Lifetime Fragments</div>
                        <div class="text-xl font-bold mono">${format(totalCookiesLifetime)}</div>
                    </div>
                </div>`;
            }
        }

        document.getElementById('main-orb').onclick = (e) => {
            const gain = getClickPower();
            cookies += gain; totalCookiesEarned += gain; totalCookiesLifetime += gain;
            const txt = document.createElement('div'); txt.className = 'floating-text';
            txt.style.left = e.clientX + 'px'; txt.style.top = e.clientY + 'px'; txt.innerText = '+' + format(gain);
            document.body.appendChild(txt); setTimeout(() => txt.remove(), 800);
        };

        document.getElementById('auto-pulse-btn').onclick = function() {
            autoPulseActive = !autoPulseActive;
            this.innerText = autoPulseActive ? 'Auto-Pulse Online' : 'Auto-Pulse Offline';
            this.classList.toggle('text-cyan-400', autoPulseActive);
            this.classList.toggle('bg-cyan-500/10', autoPulseActive);
            this.classList.toggle('border-cyan-400/20', autoPulseActive);
        };

        setInterval(() => {
            const speed = getGameSpeed();
            const cpsGain = (getTotalCPS() / 10) * speed;
            cookies += cpsGain; totalCookiesEarned += cpsGain; totalCookiesLifetime += cpsGain;

            if (autoPulseActive) {
                const pulseSpeed = spentPrestige.includes('p_auto2') ? 2 : 1;
                const clickGain = (getClickPower() / 10) * speed * pulseSpeed;
                cookies += clickGain; totalCookiesEarned += clickGain; totalCookiesLifetime += clickGain;
            }

            if (activeTab === 'items') {
                ITEMS.forEach(it => {
                    const el = document.getElementById('buy-' + it.id);
                    if (el) {
                        const aff = cookies >= getItemCost(it);
                        el.classList.toggle('afford-glow', aff);
                        el.classList.toggle('opacity-30', !aff);
                    }
                });
            } else if (activeTab === 'upgrades') {
                UPGRADES.filter(u => !ownedUpgrades.includes(u.id)).forEach(u => {
                    const el = document.getElementById('buy-' + u.id);
                    if (el) {
                        const aff = cookies >= u.cost;
                        el.classList.toggle('afford-glow', aff);
                        el.classList.toggle('opacity-30', !aff);
                    }
                });
            } else if (activeTab === 'tree') {
                // Periodically refresh the button gain text in the tree tab
                const pending = Math.max(0, Math.floor(totalCookiesLifetime / 1e9) - prestige);
                const btn = document.querySelector('[onclick="ascend()"]');
                if (btn) {
                    btn.innerText = `TRANSCEND FOR +${format(pending)} CHIPS`;
                    btn.disabled = pending < 1;
                }
            }

            const pendS = Math.max(0, Math.floor(prestige / 1e12) - superChips);
            const breachBtn = document.getElementById('super-breach-btn');
            breachBtn.disabled = pendS < 1;
            
            document.getElementById('super-count').innerText = format(superChips);
            document.getElementById('curr-chips').innerText = format(prestige);
            document.getElementById('super-gain-info').innerText = `Yield: +${format(pendS)} SC`;
            
            const progress = Math.min(100, (prestige / 1e12) * 100);
            document.getElementById('super-progress-bar').style.width = progress + '%';

            document.getElementById('cookie-count').innerText = format(cookies);
            document.getElementById('cps-display').innerText = format(getTotalCPS());
            document.getElementById('multi-display').innerText = 'x' + format(getGlobalMultiplier());
            
            const color = superChips > 0 ? '#f472b6' : '#22d3ee';
            document.getElementById('core-label').style.color = color;
            document.getElementById('orb-inner').style.borderColor = color + '44';

            if (spentPrestige.includes('p4') && !autoPulseActive) {
                autoPulseActive = true;
                const ab = document.getElementById('auto-pulse-btn');
                ab.innerText = 'Auto-Pulse Online';
                ab.classList.add('text-cyan-400', 'bg-cyan-500/10', 'border-cyan-400/20');
            }
        }, 100);

        setInterval(saveAll, 5000);
        setTab('items');
    </script>
</body>
</html>
